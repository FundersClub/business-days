name: CI

on:
  pull_request:
  push:

jobs:
  lockfile:
    name: Requirements lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: ./scripts/deps.sh check
